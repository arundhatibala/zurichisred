<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Zurich is Red.</title>
</head>

<body>

    <h1>Zurich is <span id="typing-text" style="color: red;"></span></h1>
    <p style="padding: 20px;">A small photography exercise.</p>

    <div id="masonry" class="masonry">

        <div class="item"><img src="images/2.png" alt="Image 2"></div>
        <div class="item"><img src="images/17.png" alt="Image 17"></div>
        <div class="item"><img src="images/6.png" alt="Image 6"></div>
        <div class="item"><img src="images/13.png" alt="Image 13"></div>
        <div class="item"><img src="images/7.png" alt="Image 7"></div>
        <div class="item"><img src="images/9.png" alt="Image 9"></div>
        <div class="item"><img src="images/5.png" alt="Image 5"></div>
        <div class="item"><img src="images/8.png" alt="Image 8"></div>
        <div class="item"><img src="images/1.png" alt="Image 1"></div>
        <div class="item"><img src="images/3.png" alt="Image 3"></div>
        <div class="item"><img src="images/10.png" alt="Image 10"></div>
        <div class="item"><img src="images/11.png" alt="Image 11"></div>
        <div class="item"><img src="images/12.png" alt="Image 12"></div>
        <div class="item"><img src="images/14.png" alt="Image 14"></div>
        <div class="item"><img src="images/15.png" alt="Image 15"></div>
        <div class="item"><img src="images/16.png" alt="Image 16"></div>
    </div>

    <style>
        .masonry {
            position: relative;
            width: 100%;
        }

        .item {
            position: absolute;
            /* Change this to whatever width you want (percentages, pixels, etc.) */
            width: calc(25% - 12px);
            transition: all 0.3s ease;
        }
    </style>

    <script src="index.js"></script>

</body>

</html>
